name: Build eShopModernizing

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Install .NET Framework 4.6.1 Developer Pack
      run: choco install netfx-4.6.1-devpack -y

    - name: Restore NuGet packages (MVC)
      run: nuget restore eShopLegacyMVCSolution/eShopLegacyMVC.sln

    - name: Restore NuGet packages (WebForms)
      run: nuget restore eShopLegacyWebFormsSolution/eShopLegacyWebForms.sln

    - name: Restore NuGet packages (WCF)
      run: nuget restore eShopLegacyNTier/eShopLegacyNTier.sln

    - name: Build WebForms solution
      run: msbuild eShopLegacyWebFormsSolution/eShopLegacyWebForms.sln /p:Configuration=Release /p:OutDir=out\WebForms\

    - name: Upload WebForms artifact
      uses: actions/upload-artifact@v4
      with:
        name: eShopModernizing-WebForms
        path: out\WebForms\_PublishedWebsites\eShopLegacyWebForms\
